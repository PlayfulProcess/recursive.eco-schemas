name = "recursive-eco-uploads"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# R2 bucket binding
[[r2_buckets]]
binding = "R2"
bucket_name = "recursive-eco-public"

# KV namespace for server-side usage tracking
[[kv_namespaces]]
binding = "USAGE"
id = ""  # Fill after `wrangler kv:namespace create USAGE`

# Environment variables (set via wrangler secret)
# API_KEYS = comma-separated list of valid API keys
# [vars]
# MAX_FILE_SIZE = "5242880"  # 5MB
